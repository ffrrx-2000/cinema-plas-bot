<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>سجل المشاهدة - Cinema Plus</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

:root { 
    --accent-color: #ff3333; 
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: #0a0a0a;
    color: white;
    direction: rtl;
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    padding-bottom: 20px;
}

/* Header */
.page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: rgba(10,10,10,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.back-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
}

.page-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
}

.item-count {
    margin-right: auto;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.08);
    padding: 4px 12px;
    border-radius: 20px;
}

/* Grid */
.items-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 16px;
}

.card-wrapper {
    position: relative;
}

.card {
    display: block;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    text-decoration: none;
}

.card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: #1c1c1c;
}

.card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
}

.card:active .card-overlay {
    opacity: 1;
}

.play-icon {
    font-size: 32px;
    color: #fff;
}

.card-details {
    padding: 8px 4px;
}

.card-details-title {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}

.card-details-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
}

.card-details-meta .year {
    color: rgba(255,255,255,0.5);
}

.card-details-meta .rating {
    display: flex;
    align-items: center;
    gap: 4px;
}

.card-details-meta .rating img {
    width: 28px;
    height: auto;
}

.card-details-meta .rating span {
    color: #f5c518;
    font-weight: 600;
}

/* Remove button */
.remove-btn {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
}

.card-wrapper:active .remove-btn,
.card-wrapper:hover .remove-btn {
    opacity: 1;
}

/* Empty state */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 20px;
}

.empty-state i {
    font-size: 60px;
    color: rgba(255,255,255,0.15);
}

.empty-state h3 {
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
}

.empty-state p {
    font-size: 14px;
    max-width: 260px;
}

.browse-btn {
    margin-top: 10px;
    padding: 12px 28px;
    background: var(--accent-color);
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>
<body>

<header class="page-header">
    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-right"></i>
    </a>
    <h1 class="page-title">سجل المشاهدة</h1>
    <span class="item-count" id="itemCount">0 عنصر</span>
</header>

<main>
    <div class="items-grid" id="itemsGrid"></div>
    <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <h3>لا توجد أفلام في سجل المشاهدة</h3>
        <p>الأفلام التي تشاهدها ستظهر هنا</p>
        <a href="index.html" class="browse-btn">تصفح الأفلام</a>
    </div>
</main>

<script>
function loadWatchHistory() {
    const watchHistory = JSON.parse(localStorage.getItem('watchHistory')) || [];
    const grid = document.getElementById('itemsGrid');
    const emptyState = document.getElementById('emptyState');
    const itemCount = document.getElementById('itemCount');
    
    grid.innerHTML = '';
    
    if (watchHistory.length === 0) {
        emptyState.style.display = 'flex';
        grid.style.display = 'none';
        itemCount.textContent = '0 عنصر';
        return;
    }
    
    emptyState.style.display = 'none';
    grid.style.display = 'grid';
    itemCount.textContent = watchHistory.length + ' عنصر';
    
    watchHistory.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card-wrapper';
        card.innerHTML = `
            <a class="card" href="movie.html?tmdb=${item.id}">
                <img src="${item.poster || 'https://via.placeholder.com/200x300/1c1c1c/666?text=No+Image'}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/200x300/1c1c1c/666?text=No+Image'">
                <div class="card-overlay">
                    <i class="fas fa-play play-icon"></i>
                </div>
            </a>
            <div class="card-details">
                <h3 class="card-details-title">${item.title || 'بدون عنوان'}</h3>
                <div class="card-details-meta">
                    <span class="year">${item.year || ''}</span>
                    ${item.rating ? `<div class="rating">
                        <img alt="IMDb" src="https://upload.wikimedia.org/wikipedia/commons/6/69/IMDB_Logo_2016.svg">
                        <span>${item.rating}</span>
                    </div>` : ''}
                </div>
            </div>
            <button class="remove-btn" onclick="removeItem(${index}, event)">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;
        grid.appendChild(card);
    });
}

function removeItem(index, event) {
    event.preventDefault();
    event.stopPropagation();
    
    let watchHistory = JSON.parse(localStorage.getItem('watchHistory')) || [];
    watchHistory.splice(index, 1);
    localStorage.setItem('watchHistory', JSON.stringify(watchHistory));
    loadWatchHistory();
}

document.addEventListener('DOMContentLoaded', loadWatchHistory);
</script>

</body>
</html>
